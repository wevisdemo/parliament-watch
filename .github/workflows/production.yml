name: Promote staging to production
on:
  workflow_dispatch:
jobs:
  deploy-to-production:
    runs-on: ubuntu-latest
    steps:
      - name: Promote staging image and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: bot
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.PRODUCTION_PATH }}
            docker tag parliament-watch:staging parliament-watch:production
            docker compose up -d --wait production
