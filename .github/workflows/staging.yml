name: Build and deploy to staging
on:
  push:
    branches: ['main', '**/main']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/production.yml'
      - '.github/workflows/update-ranking.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set artifact name
        run: |
          ARTIFACT=${{ github.ref_name }}
          ARTIFACT=build-${ARTIFACT/\//-}
          echo "ARTIFACT=${ARTIFACT}" >> $GITHUB_ENV
          echo "Set artifact name as ${ARTIFACT}"
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm i --prod --frozen-lockfile --ignore-scripts
      - name: Add runner IP to Cloudflare list
        run: node --import tsx scripts/cloudflare/add-runner-ip.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_RUNNER_IP_LIST_ID: ${{ secrets.CLOUDFLARE_RUNNER_IP_LIST_ID }}
      - name: Generate GraphQL client
        run: pnpm run gen:graphql
      - name: Test
        run: pnpm run test
      - name: Build static site
        run: pnpm run build
        env:
          POLITIGRAPH_URL: https://politigraph.wevis.info/graphql
          POLITIGRAPH_REQUEST_PER_SECOND: 25
      - name: Remove runner IP from Cloudflare list
        if: always()
        run: node --import tsx scripts/cloudflare/remove-runner-ip.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_RUNNER_IP_LIST_ID: ${{ secrets.CLOUDFLARE_RUNNER_IP_LIST_ID }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT }}
          path: build/*
          if-no-files-found: error
          retention-days: ${{ github.ref_name == 'main' && 7 || 1 }}
          overwrite: true
  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set artifact name
        run: |
          ARTIFACT=${{ github.ref_name }}
          ARTIFACT=build-${ARTIFACT/\//-}
          echo "ARTIFACT=${ARTIFACT}" >> $GITHUB_ENV
          echo "Set artifact name as ${ARTIFACT}"
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT }}
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./ --project-name=parliament-watch --branch=${{ github.ref_name }}
