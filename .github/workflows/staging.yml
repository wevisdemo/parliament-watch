name: Build and deploy to staging
on:
  push:
    branches: ['main']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/production.yml'
      - '.github/workflows/update-ranking.yml'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm i --frozen-lockfile --ignore-scripts
      - name: Generate GraphQL client
        run: pnpm run gen:graphql
      - name: Test
        run: pnpm run test run
      - name: Build Docker image
        run: docker build -t parliament-watch:${{ github.sha }} .
      - name: Smoke test the image (pre-deploy)
        run: |
          docker run -d --name smoke -p 3000:3000 parliament-watch:${{ github.sha }}
          timeout 60 bash -c 'until curl -fsS http://localhost:3000/healthz > /dev/null; do sleep 2; done'
          E2E_BASE_URL=http://localhost:3000 pnpm run test:e2e
          docker rm -f smoke
      - name: Save image tarball
        run: docker save parliament-watch:${{ github.sha }} | gzip > parliament-watch-image.tar.gz
      - name: Upload image to server
        uses: burnett01/rsync-deployments@6.0.0
        with:
          remote_host: ${{ secrets.PRODUCTION_HOST }}
          remote_user: bot
          remote_key: ${{ secrets.SSH_KEY }}
          remote_path: ${{ secrets.PRODUCTION_PATH }}
          switches: -azvP
          path: parliament-watch-image.tar.gz
      - name: Load image and deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: bot
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.PRODUCTION_PATH }}
            docker load < parliament-watch-image.tar.gz
            rm parliament-watch-image.tar.gz
            docker tag parliament-watch:${{ github.sha }} parliament-watch:staging
            docker compose up -d --wait staging
            docker image ls parliament-watch --format '{{.Tag}}' \
              | grep -vE '^(staging|production)$' | tail -n +4 \
              | xargs -r -I {} docker image rm parliament-watch:{} || true
      - name: Smoke test staging (post-deploy)
        run: E2E_BASE_URL=https://pwstaging.wevis.info pnpm run test:e2e
