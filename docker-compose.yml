# node:24-slim has no curl, so the healthcheck uses node's built-in fetch
x-healthcheck: &healthcheck
  test:
    [
      'CMD',
      'node',
      '-e',
      "fetch('http://localhost:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
    ]
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  production:
    image: parliament-watch:production
    restart: unless-stopped
    healthcheck: *healthcheck
    ports:
      - '127.0.0.1:3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      # ORIGIN is required by adapter-node for absolute URLs and CSRF
      ORIGIN: https://parliamentwatch.wevis.info
      PORT: 3000
      POLITIGRAPH_URL: http://host.docker.internal:4000/graphql
      POLITIGRAPH_REQUEST_PER_SECOND: 25
      POLITIGRAPH_CACHE_TTL_SECONDS: 900
      LOG_TARGET: stdout

  staging:
    image: parliament-watch:staging
    restart: unless-stopped
    healthcheck: *healthcheck
    ports:
      - '127.0.0.1:3001:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      ORIGIN: https://pwstaging.wevis.info
      PORT: 3000
      POLITIGRAPH_URL: http://host.docker.internal:4000/graphql
      POLITIGRAPH_REQUEST_PER_SECOND: 25
      POLITIGRAPH_CACHE_TTL_SECONDS: 60
      LOG_TARGET: stdout

volumes:
  caddy-data:
  caddy-config:
