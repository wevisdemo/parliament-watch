x-healthcheck: &healthcheck
  test:
    [
      'CMD',
      'node',
      '-e',
      "fetch('http://localhost:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
    ]
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy:/data

  production:
    image: parliament-watch:production
    container_name: production
    restart: unless-stopped
    healthcheck: *healthcheck
    mem_limit: 600m
    mem_reservation: 384m
    extra_hosts:
      # Resolve politigraph to its origin server directly
      # The image trust Cloudflare's origin root CA via NODE_EXTRA_CA_CERTS.
      - 'politigraph.wevis.info:${POLITIGRAPH_ORIGIN_IP:?set POLITIGRAPH_ORIGIN_IP in .env}'
    environment:
      # ORIGIN is required by adapter-node for absolute URLs and CSRF
      ORIGIN: https://parliamentwatch.wevis.info
      PORT: 3000
      # Keep V8's heap under mem_limit so it GCs before the container is OOM-killed
      NODE_OPTIONS: --max-old-space-size=448
      POLITIGRAPH_URL: $POLITIGRAPH_URL
      POLITIGRAPH_REQUEST_PER_SECOND: 25
      POLITIGRAPH_CACHE_TTL_SECONDS: 900
      LOG_TARGET: stdout

  staging:
    image: parliament-watch:latest
    container_name: staging
    restart: unless-stopped
    healthcheck: *healthcheck
    mem_limit: 200m
    mem_reservation: 128m
    extra_hosts:
      - 'politigraph.wevis.info:${POLITIGRAPH_ORIGIN_IP:?set POLITIGRAPH_ORIGIN_IP in .env}'
    environment:
      ORIGIN: https://pwstaging.wevis.info
      PORT: 3000
      NODE_OPTIONS: --max-old-space-size=144
      POLITIGRAPH_URL: $POLITIGRAPH_URL
      POLITIGRAPH_REQUEST_PER_SECOND: 25
      POLITIGRAPH_CACHE_TTL_SECONDS: 60
      POLITIGRAPH_CACHE_MAX_ENTRIES: 100
      LOG_TARGET: stdout

  beszel-agent:
    image: henrygd/beszel-agent:0.16
    container_name: beszel-agent
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - beszel_agent:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 45876
      HUB_URL: $BESZEL_AGENT_HUB_URL
      TOKEN: $BESZEL_AGENT_TOKEN
      KEY: $BESZEL_AGENT_KEY

volumes:
  caddy:
  beszel_agent:
